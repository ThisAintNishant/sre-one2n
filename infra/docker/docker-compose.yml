services:
  postgres:
    image: postgres:17

    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: srebootcamp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
