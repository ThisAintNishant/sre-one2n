apiVersion: apps/v1
kind: Deployment

metadata:
  name: sre-api
  namespace: sre-bootcamp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: sre-api

  template:
    metadata:
      labels:
        app: sre-api

    spec:
      containers:
        - name: api

          image: sre-bootcamp-api:v3

          imagePullPolicy: Never

          ports:
            - containerPort: 8080

          env:
            - name: PORT
              value: "8080"

            - name: DB_HOST
              value: postgres

            - name: DB_PORT
              value: "5432"

            - name: DB_USER
              value: admin

            - name: DB_PASSWORD
              value: password

            - name: DB_NAME
              value: srebootcamp